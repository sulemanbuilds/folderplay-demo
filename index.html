<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Folder Play</title>

    <!-- Css Link -->
    <link rel="stylesheet" href="./style.css">

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>
    <nav>
        <ul>
            <li class="logo"><a href="./index.html">FolderPlay</a></li>
            <li><a href="./index.html" class="link">Player</a></li>
            <li><a href="#" class="link">About</a></li>
        </ul>
    </nav>

    <!-- Main Body Code -->
    <div class="container">
        <div class="playlist">
            <div class="playlist-head">
                <h1>Playlist</h1>
                <button class="button" type="button" id="selectFolderBtn">
                    Select Folder
                </button>
                <input type="file" id="folderInput" webkitdirectory multiple hidden accept="audio/*">

            </div>

            <div class="slogan">
                <p>Craft playlists like a true connoisseur</p>
            </div>

            <!-- Song Menu Div-->
            <div class="song-menu">

                <!-- Hidden song item, Songs Loaded with Javascript -->

                <!-- <li class="song-item">
                    <span>01</span>
                    <img src="./cover/1.jpg">
                    <h3>
                        Demo song
                        <div class="subtitle">Demo Subtitles</div>
                    </h3>
                    <i class="fa-solid fa-play"></i>
                </li> -->

                <!-- Guide Line To Select Folder -->
                <div class="folder-guide">
                    <p>(Select Folder To Get Started...)</p>
                </div>


                </div>
            </div>

            <!-- Song Player Div -->
            <div class="player">

                <!-- Music Control Bar -->
                <div class="control-bar">
                    <div class="icon-container">
                        <i class="fa-solid fa-backward-step"></i>
                        <i class="fa-solid fa-play"></i>
                        <i class="fa-solid fa-forward-step"></i>
                    </div>

                    <div class="timer">
                        <span>0:00</span>
                        <div class="bar">
                            <!-- <input type="range" value="0" min="0" max="100"> -->
                            <div class="bar2"></div>
                            <div class="dot"></div>
                        </div>
                        <span>0:00</span>
                    </div>

                    <div class="sound-control">
                        <div class="icon">
                            <i class="fa-solid fa-volume-high"></i>
                        </div>
                        <div class="sound-bar">
                            <!-- <input type="range" value="0" min="0" max="100"> -->
                            <div class="bar2"></div>
                            <div class="dot"></div>
                        </div>
                    </div>

                </div>

            </div>
        </div>

        <script src="./script.js"></script>
</body>

</html>
